version: "3.9"

services:
  backend:
    build: ./backend
    container_name: ai-ticket-backend
    ports:
      - "5100:5100"
    restart: always

  frontend:
    build: ./frontend/vite-project
    container_name: ai-ticket-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: always